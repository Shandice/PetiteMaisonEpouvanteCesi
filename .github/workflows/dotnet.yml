name: .NET CI/CD Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-test-and-analyze:
    runs-on: self-hosted # Utilise ton runner local directement pour accéder à localhost:9000

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Requis par SonarQube pour une analyse complète

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
      env:
        DOTNET_INSTALL_DIR: 'C:\dotnet-ci'

    - name: Install SonarScanner
      run: dotnet tool install --global dotnet-sonarscanner

    - name: Restore dependencies
      run: dotnet restore PetiteMaisonEpouvante.Solution.sln
      
    # 1. On démarre l'analyse SonarQube (on pointe vers ton localhost:9000)
    - name: Begin SonarQube Analysis
      run: |
        dotnet sonarscanner begin /k:"PetiteMaisonEpouvante" /d:sonar.host.url="http://localhost:9000"  /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"

    - name: Build
      run: dotnet build PetiteMaisonEpouvante.Solution.sln --no-restore

    # 2. On lance les tests en générant un rapport de couverture compatible avec SonarQube
    - name: Test and Collect Coverage
      run: dotnet test PetiteMaisonEpouvante.Solution.sln --no-build --verbosity normal /p:CollectCoverage=true /p:CoverletOutputFormat=opencover --filter "FullyQualifiedName!~LoadTests"

    # 3. On termine l'analyse (les résultats sont envoyés à ton SonarQube local)
    - name: End SonarQube Analysis
      run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

  build-docker-images:
    needs: build-test-and-analyze
    runs-on: self-hosted # Toujours en local pour que Kubernetes y ait accès directement
    
    steps:
    - uses: actions/checkout@v4

    - name: Build API Image
      run: docker build -t petitemaisonepouvante.api:latest -f PetiteMaisonEpouvante.API/Dockerfile .
      
    - name: Build UI Image
      run: docker build -t petitemaisonepouvante.ui:latest -f PetiteMaisonEpouvante.UI/Dockerfile .

    - name: Run Trivy vulnerability scanner via Docker
      run: >
        docker run --rm 
        -v /var/run/docker.sock:/var/run/docker.sock 
        aquasec/trivy:latest 
        image 
        --severity CRITICAL,HIGH 
        --ignore-unfixed 
        --exit-code 0 
        petitemaisonepouvante.api:latest

  deploy-local-k8s:
    needs: build-docker-images
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to Local Kubernetes
      run: |
        # On applique tous les fichiers du dossier k8s
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/jwt-secret.yaml
        kubectl apply -f k8s/db-deployment.yaml
        kubectl apply -f k8s/api-deployment.yaml
        kubectl apply -f k8s/ui-deployment.yaml
        kubectl apply -f k8s/ingress.yaml
        
        # On force Kubernetes à redémarrer les pods pour prendre en compte 
        # les nouvelles images "latest" fraîchement buildées par la CI
        kubectl rollout restart deployment/petitemaisonepouvante-api -n petitemaisonepouvante
        kubectl rollout restart deployment/petitemaisonepouvante-ui -n petitemaisonepouvante