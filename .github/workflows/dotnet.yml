name: .NET CI/CD Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore PetiteMaisonEpouvante.Solution.sln
      
    - name: Build
      run: dotnet build PetiteMaisonEpouvante.Solution.sln --no-restore
      
    - name: Test and Collect Coverage
      run: dotnet test PetiteMaisonEpouvante.Solution.sln --no-build --verbosity normal --collect:"XPlat Code Coverage" --filter "FullyQualifiedName!~LoadTests"

    # run the heavier load/performance scenario separately so it's easy to
    # identify failures or to allocate more resources if needed
    - name: Run Load/Performance Tests
      run: |
        dotnet test PetiteMaisonEpouvante.Tests/PetiteMaisonEpouvante.Tests.csproj \
          --no-build \
          --filter FullyQualifiedName~LoadTests \
          --verbosity normal
      # a timeout could be added via 'timeout-minutes' at the job level if needed

  build-docker-images:
    needs: build-and-test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Simulate Deployment (Build Docker Compose)
      run: docker compose build

    - name: Build API Image for Scanning
      run: docker build -t petitemaisonepouvante.api:latest -f PetiteMaisonEpouvante.API/Dockerfile .

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'petitemaisonepouvante.api:latest'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

  deploy-local:
    needs: build-docker-images
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - uses: actions/checkout@v4

    - name: Deploy locally on self-hosted runner
      run: |
        docker compose pull
        docker compose up -d --build
        docker image prune -f

  # optionally you could deploy to a Kubernetes cluster here.  GitHub Actions
  # runners do not have a cluster by default, but you could add a step to
  # configure `kubectl` against your environment (kind, GKE, AKS, etc.) and then
  # apply the manifests located in the `k8s/` directory:
