apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: petitemaisonepouvante-ingress
  namespace: petitemaisonepouvante
  annotations:
    # Use the ingress controller you enabled (nginx/traefik etc.)
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: localhost
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: petitemaisonepouvante-ui
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: petitemaisonepouvante-api
            port:
              number: 80
  # for TLS you could add a tls block and use cert-manager or self-signed certs
