services:
  traefik:
    image: traefik:v3.0
    command:
      - "--api.insecure=true" # Active le dashboard Traefik
      - "--providers.docker=true" # Écoute les événements Docker
      - "--providers.docker.exposedbydefault=false" # Ne route pas les conteneurs sans labels
      - "--entryPoints.web.address=:80"
      - "--entryPoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Port pour accéder au Dashboard Traefik (http://localhost:8080)
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro" # Permet à Traefik de lire la config des conteneurs

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Password123!
    ports:
      - "1433:1433"

  seq:
    image: datalust/seq:latest
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=adminpassword
    ports:
      - "5341:80"

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    ports:
      - "8081:8080"

  api:
    build:
      context: .
      dockerfile: PetiteMaisonEpouvante.API/Dockerfile
    environment:
      - ASPNETCORE_HTTP_PORTS=80
      - ConnectionStrings__DefaultConnection=Server=db;Database=CollectorDb;User Id=sa;Password=Password123!;TrustServerCertificate=True;
    depends_on:
      - db
      - seq
    labels:
      - "traefik.enable=true"
      # On accèdera à l'API via https://api.localhost
      - "traefik.http.routers.api.rule=Host(`api.localhost`)"
      - "traefik.http.routers.api.entrypoints=websecure" # Force le HTTPS
      - "traefik.http.routers.api.tls=true" # Active le certificat auto-signé

  ui:
    build:
      context: .
      dockerfile: PetiteMaisonEpouvante.UI/Dockerfile
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      # On accèdera à l'UI via https://localhost
      - "traefik.http.routers.ui.rule=Host(`localhost`)"
      - "traefik.http.routers.ui.entrypoints=websecure" # Force le HTTPS
      - "traefik.http.routers.ui.tls=true" # Active le certificat auto-signé

  # helper container that applies our Kubernetes manifests to the local cluster; it runs once when `docker compose up` is invoked and then exits.
  k8s-init:
    image: bitnami/kubectl:latest
    depends_on:
      - db
      - api
      - ui
    volumes:
      - ./k8s:/k8s:ro
      - ~/.kube:/root/.kube:ro
    command: >
      /bin/sh -c '\
        until kubectl version >/dev/null 2>&1; do sleep 1; done;\
        kubectl apply -f /k8s/namespace.yaml;\
        kubectl apply -f /k8s/jwt-secret.yaml;\
        kubectl apply -f /k8s/db-deployment.yaml;\
        kubectl apply -f /k8s/api-deployment.yaml;\
        kubectl apply -f /k8s/ui-deployment.yaml;\
        kubectl apply -f /k8s/ingress.yaml;\
      '
    restart: 'no'
