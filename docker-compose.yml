services:
  traefik:
    image: traefik:v2
    restart: unless-stopped
    command:
      - "--log.level=DEBUG" # Active les logs détaillés pour comprendre le blocage
      - "--api.insecure=true" # Active le dashboard Traefik
      - "--providers.docker=true" # Écoute les événements Docker
      - "--providers.docker.exposedbydefault=false" # Ne route pas les conteneurs sans labels
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure" # Redirige HTTP vers HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Port pour accéder au Dashboard Traefik (http://localhost:8080)
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Password123!
    ports:
      - "1433:1433"

  seq:
    image: datalust/seq:latest
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=adminpassword
    ports:
      - "5341:80"

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    restart: unless-stopped
    command: start-dev
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    ports:
      - "8081:8080"

  api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: PetiteMaisonEpouvante.API/Dockerfile
    environment:
      - ASPNETCORE_HTTP_PORTS=80
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=PetiteMaisonEpouvanteDb;User Id=sa;Password=Password123!;TrustServerCertificate=True;
    depends_on:
      - db
      - seq
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pme-api.rule=Host(`api.localhost`) || (Host(`localhost`) && PathPrefix(`/api`))"
      - "traefik.http.routers.pme-api.entrypoints=websecure"
      - "traefik.http.routers.pme-api.tls=true"
      - "traefik.http.services.pme-api.loadbalancer.server.port=80"

  ui:
    restart: unless-stopped
    build:
      context: .
      dockerfile: PetiteMaisonEpouvante.UI/Dockerfile
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pme-ui.rule=Host(`localhost`)"
      - "traefik.http.routers.pme-ui.entrypoints=websecure"
      - "traefik.http.routers.pme-ui.tls=true"
      - "traefik.http.services.pme-ui.loadbalancer.server.port=80"

  # helper container that applies our Kubernetes manifests to the local cluster; it runs once when `docker compose up` is invoked and then exits.
  k8s-init:
    image: bitnami/kubectl:latest
    depends_on:
      - db
      - api
      - ui
    volumes:
      - ./k8s:/k8s:ro
      - ~/.kube:/root/.kube:ro
    command: >
      /bin/sh -c '\
        until kubectl version >/dev/null 2>&1; do sleep 1; done;\
        kubectl apply -f /k8s/namespace.yaml;\
        kubectl apply -f /k8s/jwt-secret.yaml;\
        kubectl apply -f /k8s/db-deployment.yaml;\
        kubectl apply -f /k8s/api-deployment.yaml;\
        kubectl apply -f /k8s/ui-deployment.yaml;\
        kubectl apply -f /k8s/ingress.yaml;\
      '
    restart: 'no'
